    <style>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            /* 現代柔和配色 */
            --bs-primary: #5D9CEC;
            /* 柔和藍 */
            --bs-primary-rgb: 93, 156, 236;
            --bs-secondary: #AAB2BD;
            /* 淺灰 */
            --bs-success: #48CFAD;
            /* 薄荷綠 */
            --bs-danger: #FC6E51;
            /* 珊瑚紅 */
            --bs-warning: #FFCE54;
            /* 太陽黃 */
            --bs-info: #4FC1E9;
            --bs-light: #F5F7FA;
            --bs-dark: #434A54;

            /* 字體設定 */
            --bs-body-font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            --bs-body-color: #434A54;
            --bs-body-bg: #F5F7FA;

        .card {

            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #FFFFFF;
            overflow: hidden;

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--bs-primary), var(--bs-success));
            opacity: 0.8;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--bs-primary), var(--bs-success));
            opacity: 0.8;
        }

        .card:hover {
            transform: translateY(-5px);

        .card-title {
            color: var(--bs-dark);

        .countdown-item {

    <script>
        // 解析後端傳過來的 JSON 資料
        let pageData = {};
        let pageDataError = null;
        try {
            const pageDataBase64 = '<?= pageDataBase64 ?>';
            if (pageDataBase64) {
                const pageDataJson = decodeURIComponent(escape(atob(pageDataBase64)));
                pageData = JSON.parse(pageDataJson || '{}');
            }
        } catch (error) {
            console.error('頁面資料解析錯誤:', error);
            pageDataError = error;
            pageData = {};
        }
        const {
            user = {},
            configs = {},
            loginEmail = '',
            serviceUrl = '',
            headers = [],
            data = [],
        } = pageData;

        document.addEventListener("DOMContentLoaded", function () {
            if (pageDataError) {
                const container = document.querySelector('.container-fluid') || document.body;
                container.innerHTML = `
                    <div class="alert alert-danger mt-4" role="alert">
                        初始化頁面資料時發生錯誤，請重新整理頁面或聯絡系統管理員。<br>
                        錯誤訊息：${pageDataError.message}
                    </div>
                `;
                return;
            }

            // 初始化頁面資料
            initializePageData();

            try {
                if (!headers || headers.length === 0) {
                    throw new Error('沒有表頭資料');
                }

                const container = document.getElementById('student-data-container');

                if (!data || data.length === 0) {
                    container.innerHTML = `
                            <div class="alert alert-info text-center" role="alert">
                                目前沒有學生資料
                            </div>
                        `;
                    return;
                }

                data.sort((a, b) => {
                    const serialA = a[headers.indexOf('統一入學測驗報名序號')] || "";
                    const serialB = b[headers.indexOf('統一入學測驗報名序號')] || "";
                    return serialA.localeCompare(serialB, "zh-TW");
                });

                // 產生學生資料卡片
                const cardsHtml = data.map(row => {
                    const studentNameIndex = headers.indexOf('考生姓名');
                    const groupIndex = headers.indexOf('報考群(類)名稱');
                    const classIndex = headers.indexOf('班級名稱');
                    const paymentTypeIndex = headers.indexOf('繳費身分');
                    const feeIndex = headers.indexOf('報名費');
                    const isJoinedIndex = headers.indexOf('是否參加集體報名');

                    // 找出志願相關的索引
                    const wishIndexes = headers
                        .map((header, index) => ({header, index}))
                        .filter(item => /志願[1-6]校系名稱/.test(item.header));

                    // 建立志願資訊HTML，只包含非空白的志願
                    const wishesHtml = wishIndexes
                        .map(({header, index}) => {
                            if (row[isJoinedIndex] === '否' || !row[index]) {
                                return '';
                            }
                            // 只取出「(該校可報志願數」之前的文字
                            const wishText = row[index].split('(該校可報志願數')[0].trim();
                            return `
                                    <div class="student-info-item">
                                        <div class="student-info-label">${header}</div>
                                        <div class="student-info-value">${wishText}</div>
                                    </div>
                                `;
                        })
                        .filter(html => html !== '')
                        .join('');

                    // 建立卡片HTML
                    return `
                            <div class="student-card">
                                <div class="student-card-header">
                                    ${row[studentNameIndex]} 
                                    <small class="text-muted">
                                    (${row[classIndex] || ''} / ${row[groupIndex] || ''} / ${row[paymentTypeIndex] || ''} ${row[isJoinedIndex] === '是' ? `/ ${row[feeIndex]} 元` : ''})
                                    </small>
                                </div>
                                <div class="student-card-body">
                                    <div class="student-info">
                                        ${row[isJoinedIndex] === '否' ?
                            '<div class="alert alert-danger mb-0">此學生不參加集體報名</div>' :
                            (wishesHtml ? '<div class="alert alert-success mb-0">' + wishesHtml + '</div>' : '<div class="alert alert-warning mb-0">此學生尚未填寫志願</div>')}
                                    </div>
                                </div>
                            </div>
                        `;
                }).join('');

                container.innerHTML = cardsHtml;

            } catch (error) {
                console.error('資料處理錯誤:', error);
                const container = document.querySelector('.container-fluid');
                container.innerHTML = `
                        <div class="alert alert-danger" role="alert">
                            載入資料時發生錯誤，請重新整理頁面或聯絡系統管理員。
                            <br>
                            錯誤訊息：${error.message}
                        </div>
                    `;
            }
        });

        // 初始化頁面資料
        function initializePageData() {
            // 導航列
            const navBrand = document.getElementById('navbarBrand');

            if (navBrand) {
                navBrand.href = serviceUrl;
                const schoolName = String(configs['學校名稱'] || '');
                const systemName = String(configs['系統名稱'] || '');
                navBrand.textContent = '';
                navBrand.appendChild(document.createTextNode(schoolName));
                navBrand.appendChild(document.createElement('br'));
                navBrand.appendChild(document.createTextNode(systemName));
            }

            // 教師資訊
            document.getElementById('teacherClass').textContent = user['班級'] || '';
            document.getElementById('teacherName').textContent = user['姓名'] || '';
            document.getElementById('classCount').textContent = data.length;

            // 計算填答和參加人數
            const isJoinedIndex = headers.indexOf('是否參加集體報名');
            const answeredCount = data.filter(row => row[isJoinedIndex] !== '').length;
            const joinedCount = data.filter(row => row[isJoinedIndex] === '是').length;
            document.getElementById('answeredCount').textContent = answeredCount;
            document.getElementById('joinedCount').textContent = joinedCount;

            // 頁尾
            const footerText = document.getElementById('footerText');
            if (footerText) {
                const schoolName = String(configs['學校名稱'] || '');
                const systemName = String(configs['系統名稱'] || '');
                const link = document.createElement('a');
                link.href = 'https://www.google.com/maps?q=' + encodeURIComponent(schoolName);
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.textContent = schoolName + systemName;
                footerText.textContent = '';
                footerText.appendChild(link);
            }

            // 聯絡資訊
            const contactUnit = document.getElementById('contactUnit');
            const contactPhone = document.getElementById('contactPhone');
            const contactEmail = document.getElementById('contactEmail');

            if (contactUnit) {
                contactUnit.textContent = configs['承辦單位'] || '-';
            }
            if (contactPhone) {
                contactPhone.textContent = configs['聯絡電話'] || '-';
            }
            if (contactEmail) {
                const email = configs['電子郵件'] || '-';
                if (email !== '-') {
                    contactEmail.href = 'mailto:' + email;
                    contactEmail.textContent = email;
                } else {
                    contactEmail.href = '#';
                    contactEmail.textContent = '-';
                }
            }
        }

        // 統計頁籤初始化改由 statisticsShared.html 統一管理

        function updateCountdown() {
            const endTime = new Date(configs['系統關閉時間']);
            const countdownTimer = document.getElementById("countdownTimer");
            const now = new Date();
            const timeLeft = endTime - now;

            if (timeLeft < 0) {
                clearInterval(timerInterval);
                countdownTimer.innerHTML = "<div class='alert alert-warning py-2 px-3 mb-0'><strong class='text-danger'>報名截止！</strong></div>";
                return;
            }

            const padZero = num => num.toString().padStart(2, '0');
            const seconds = padZero(Math.floor((timeLeft / 1000) % 60));
            const minutes = padZero(Math.floor((timeLeft / 1000 / 60) % 60));
            const hours = Math.floor(timeLeft / 1000 / 60 / 60);

            let timerHtml = '';

            if (hours > 0) {
                timerHtml += `
                    <div class="countdown-item">
                        <span class="countdown-value">${hours}</span>
                        <span class="countdown-label">時</span>
                    </div>`;
            }

            timerHtml += `
                <div class="countdown-item">
                    <span class="countdown-value">${minutes}</span>
                    <span class="countdown-label">分</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value">${seconds}</span>
                    <span class="countdown-label">秒</span>
                </div>`;

            countdownTimer.innerHTML = `<div class="countdown-container">${timerHtml}</div>`;
        }

        const timerInterval = setInterval(updateCountdown, 1000);
        updateCountdown();

        // 統計共用邏輯已抽出至 statisticsShared.html
    </script>
